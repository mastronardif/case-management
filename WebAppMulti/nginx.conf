worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;   # wildcard to accept any host

        # ---------------------------
        # App1 (ASPNETCORE_PATHBASE=/app1)
        # ---------------------------
        location /app1/ {
            proxy_pass http://webappmulti:80/;  # container name + internal port
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Forward PathBase
            proxy_set_header X-Forwarded-PathBase /app1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------------------------
        # App2 (ASPNETCORE_PATHBASE=/app2)
        # ---------------------------
        location /app2/ {
            proxy_pass http://webappmulti2:80/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            proxy_set_header X-Forwarded-PathBase /app2;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optional root page
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }
    }
}
